# ローカル学習用 compose ファイル。
#
# 教材としてのねらい:
#   - 各サービスの繋ぎ先が environment ブロックで一目で分かること
#
# Ollama 利用方針 (Issue #29):
#   - デフォルトでは Ollama は **ホスト OS 側** で `ollama serve` を起動する想定
#   - `docker compose up -d` ではここで定義する ollama サービスは起動しない
#     (`profiles: [bundled-ollama]` でデフォルト除外)
#   - Docker Compose 内で Ollama も一括起動したい場合は Makefile の `make up-d`
#     を使う (Makefile 側で `--profile bundled-ollama` 指定)

services:
  # ──────────────────────────────────────────────
  # LLM (ローカル) — オプション (profile: bundled-ollama)
  # ──────────────────────────────────────────────
  ollama:
    image: ollama/ollama:latest
    # profile が指定されていない通常の `docker compose up -d` ではこのサービスは
    # 起動しない。Makefile の `make up-d` が `--profile bundled-ollama` を付与する。
    profiles: ["bundled-ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ──────────────────────────────────────────────
  # Vector DB
  # ──────────────────────────────────────────────
  chromadb:
    image: chromadb/chroma:latest
    ports:
      - "8001:8000"
    volumes:
      - chromadb_data:/data
      - ./chroma-config.yaml:/config.yaml
    environment:
      IS_PERSISTENT: "TRUE"
      ANONYMIZED_TELEMETRY: "FALSE"
    healthcheck:
      test: ["CMD", "bash", "-c", "exec 3<>/dev/tcp/localhost/8000"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  # ──────────────────────────────────────────────
  # RDB (会話履歴 / コレクション・ドキュメント管理)
  # ──────────────────────────────────────────────
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat -d chat"]
      interval: 5s
      timeout: 3s
      retries: 10

  # ──────────────────────────────────────────────
  # Backend (FastAPI)
  # ──────────────────────────────────────────────
  backend:
    build: .
    image: rag-chat-template-backend
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    # Linux Docker でも host.docker.internal を解決できるようにする
    # (Docker Desktop / Mac / Windows ではこの設定がなくても解決可能だが、
    #  Linux Docker Engine では host-gateway を明示しないと解決されない)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      # OLLAMA_URL は .env で上書き可能。
      # 未設定時の既定はホスト OS 側 Ollama (Issue #29 でデフォルト化)
      OLLAMA_URL: ${OLLAMA_URL:-http://host.docker.internal:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.2}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-nomic-embed-text}
      VECTOR_DB_PROVIDER: ${VECTOR_DB_PROVIDER:-chroma}
      CHROMA_HOST: chromadb
      CHROMA_PORT: "8000"
      DATABASE_URL: postgresql+psycopg://chat:chat@db:5432/chat
      CORS_ALLOW_ORIGINS: "http://localhost:3000"
      MAX_UPLOAD_MB: ${MAX_UPLOAD_MB:-50}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LANGFUSE_SECRET_KEY: ${LANGFUSE_SECRET_KEY:-}
      LANGFUSE_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY:-}
      LANGFUSE_HOST: ${LANGFUSE_HOST:-https://cloud.langfuse.com}
    # backend は ollama に依存しない (ホスト Ollama がデフォルトのため)。
    # compose 内 ollama を使う場合 (`make up-d`) は profile 経由で同時起動する。
    depends_on:
      db:
        condition: service_healthy
      chromadb:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 10s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────
  # Frontend (Next.js App Router)
  # ──────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      API_URL: http://backend:8000
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ollama:
  pgdata:
  chromadb_data:
