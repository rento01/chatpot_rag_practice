name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # Backend (FastAPI) lint + syntax
  # ──────────────────────────────────────────────
  backend:
    name: Backend lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff==0.15.6

      - name: Ruff check
        run: ruff check backend alembic

      - name: Syntax check
        run: python -m compileall -q backend alembic

  # ──────────────────────────────────────────────
  # Frontend (Next.js) build
  # ──────────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

  # ──────────────────────────────────────────────
  # Terraform (formatting + validate)
  # 教材初期段階では plan/apply は流さない。
  # AWS 移行 (Phase 7) で OIDC を組んでから、deploy ワークフローを追加する想定。
  # ──────────────────────────────────────────────
  terraform:
    name: Terraform fmt & validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: terraform
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.9.7

      - name: terraform fmt
        run: terraform fmt -check -recursive

      - name: terraform init (no backend)
        run: terraform init -backend=false

      - name: terraform validate
        run: terraform validate

  # ──────────────────────────────────────────────
  # OIDC で apply / deploy する想定 (Phase 7 で実装)
